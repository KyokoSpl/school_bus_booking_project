version: '3.8'

services:
  db:
    image: mariadb:10.11
    container_name: busbooker-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password_change_me
      MYSQL_DATABASE: busbooker
      MYSQL_USER: busbooker
      MYSQL_PASSWORD: busbooker_dev_password
    ports:
      - "3306:3306"
    volumes:
      - busbooker_db_data:/var/lib/mysql
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci

  # Optional: Adminer für DB-Verwaltung im Browser
  adminer:
    image: adminer:latest
    container_name: busbooker-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - db

volumes:
  busbooker_db_data:
